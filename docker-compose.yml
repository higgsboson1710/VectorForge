version: '3.8'

services:
  # 1. The VectorForge C++ Backend
  vectorforge:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      # Tell the C++ app to look for Ollama at the container network address
      - OLLAMA_HOST=http://ollama:11434

  # 2. The Ollama AI Daemon
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
