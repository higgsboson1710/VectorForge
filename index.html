<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VectorForge — HNSW + RAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #09090b;
  --card:   #18181b;
  --border: #27272a;
  --cs:     #22d3ee;
  --math:   #f472b6;
  --food:   #fbbf24;
  --sports: #34d399;
  --accent: #22d3ee;
  --text:   #fafafa;
  --muted:  #a1a1aa;
  --red:    #f87171;
  --green:  #4ade80;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Fira Code', 'Courier New', monospace;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
header h1 {
  font-size: 17px; font-weight: 600; letter-spacing: 4px;
  background: linear-gradient(90deg, var(--cs), var(--accent), var(--math));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; letter-spacing: 1px; border: 1px solid var(--border); color: var(--muted); }
.badge.hl { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.12); }
.badge.ok { border-color: var(--green); color: var(--green); background: rgba(166,227,161,.1); }
.badge.err { border-color: var(--red); color: var(--red); background: rgba(243,139,168,.1); }
#statsLabel { margin-left: auto; font-size: 11px; color: var(--muted); }

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }
.left-panel { width: 260px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 18px; }
.center-panel { flex: 1; position: relative; overflow: hidden; }
#scatter { display: block; width: 100%; height: 100%; }
.right-panel { width: 360px; flex-shrink: 0; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

/* ── TABS ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 10px 6px; text-align: center; font-size: 10px; letter-spacing: 1px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s; }
.tab.on { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; flex: 1; overflow-y: auto; padding: 16px; flex-direction: column; gap: 16px; }
.tab-content.on { display: flex; }

/* ── COMMON COMPONENTS ── */
.sec { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
input[type=text], select, textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 9px 11px; border-radius: 6px; font-family: inherit; font-size: 12px; outline: none; transition: border-color .2s;
}
input[type=text]:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
select option { background: var(--card); }
input[type=range] { width: 100%; accent-color: var(--accent); background: transparent; border: none; padding: 0; }
button {
  width: 100%; padding: 9px 14px; border: none; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 500; letter-spacing: .5px; transition: all .2s;
}
.btn-p { background: linear-gradient(135deg, var(--accent), #4f46e5); color: #fff; box-shadow: 0 0 18px rgba(108,99,255,.3); }
.btn-p:hover { box-shadow: 0 0 28px rgba(108,99,255,.55); transform: translateY(-1px); }
.btn-p:disabled { opacity: .5; transform: none; cursor: wait; }
.btn-s { background: var(--border); color: var(--text); }
.btn-s:hover { background: #1c1c35; }
.btn-s:disabled { opacity: .5; cursor: wait; }
.btn-g { background: rgba(166,227,161,.12); color: var(--green); border: 1px solid rgba(166,227,161,.3); }
.btn-g:hover { background: rgba(166,227,161,.22); }
.btn-g:disabled { opacity: .5; cursor: wait; }

.algo-row { display: flex; gap: 5px; }
.algo-btn { flex: 1; padding: 7px 4px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 10px; cursor: pointer; text-align: center; transition: all .2s; letter-spacing: .5px; font-family: inherit; }
